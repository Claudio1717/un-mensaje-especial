<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para alguien especial</title>
    <style>
        body { background-color: #ffe6e6; text-align: center; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .contenedor { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 450px; position: relative; width: 85%; min-height: 300px; display: flex; flex-direction: column; justify-content: center; }
        h1 { color: #ff4d4d; font-size: 22px; line-height: 1.4; }
        .texto-maquina { color: #333; font-size: 1.1em; line-height: 1.6; white-space: pre-wrap; margin-bottom: 20px; }
        .botones { margin-top: 25px; display: flex; justify-content: center; gap: 15px; }
        button { padding: 12px 25px; font-size: 16px; border-radius: 10px; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; }
        #btnSi { background-color: #ff4d4d; color: white; }
        #btnNo { background-color: #999; color: white; position: absolute; }
        .mensaje-final { display: none; }
        .corazon { color: #ff4d4d; font-size: 40px; margin: 10px 0; }
        i { color: #555; }
    </style>
</head>
<body>

    <div id="player" style="position: absolute; top: -9999px;"></div>

    <div class="contenedor" id="pregunta">
        <div class="corazon">❤</div>
        <h1>Tengo algo muy especial que decirte... <br> ¿Quieres saber qué es?</h1>
        <div class="botones">
            <button id="btnSi" onclick="iniciarSorpresa()">¡SÍ!</button>
            <button id="btnNo" onmouseover="moverBoton()">No</button>
        </div>
    </div>

    <div class="contenedor mensaje-final" id="regalo">
        <div class="corazon">❤</div>
        <h1 id="subtitulo"></h1>
        <div id="escritura" class="texto-maquina"></div>
        <div class="corazon">❤</div>
    </div>

    <script>
        function moverBoton() {
            const btnNo = document.getElementById('btnNo');
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }

        const mensaje = "Nunca olvides que eres la mejor chica de este mundo: hermosa, inteligente, graciosa, un poco loca y con un hermoso corazón.\n\nComo dijo Mario Benedetti:\n\"Te quiero así como eres, con todo lo bueno que no ves, con todo lo malo que dices tener.\"\n\nSiempre recuerda que serás importante... Bueno, para mí lo eres.";

        function iniciarSorpresa() {
            document.getElementById('pregunta').style.display = 'none';
            document.getElementById('regalo').style.display = 'flex';
            
            // Iniciar música
            const player = document.getElementById('player');
            player.innerHTML = '<iframe width="0" height="0" src="https://www.youtube.com/embed/xnG9lJKPH-I?autoplay=1" frameborder="0" allow="autoplay"></iframe>';

            // Escribir subtítulo primero
            let titulo = "¡Sabía que querrías saber! ✨";
            document.getElementById('subtitulo').innerText = titulo;

            // Iniciar efecto de máquina de escribir
            let i = 0;
            const contenedorTexto = document.getElementById('escritura');
            
            function escribir() {
                if (i < mensaje.length) {
                    contenedorTexto.textContent += mensaje.charAt(i);
                    i++;
                    setTimeout(escribir, 50); // Velocidad: 50ms por letra
                }
            }
            
            setTimeout(escribir, 1000); // Espera 1 segundo antes de empezar a escribir
        }
    </script>
</body>
</html>
