<!DOCTYPE html>
<html>
<head>
    <title>Para alguien especial</title>
    <style>
        body { background-color: #ffe6e6; text-align: center; font-family: 'Arial', sans-serif; padding: 50px; }
        .carta { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; }
        h1 { color: #ff4d4d; }
        p { font-size: 1.2em; color: #333; line-height: 1.6; }
        .corazon { color: #ff4d4d; font-size: 50px; }
    </style>
</head>
<body>
    <div class="carta">
        <div class="corazon">❤</div>
        <h1>¡Hola!Solo quería recordarte algo...</h1>
        <p>Nunca olvides que eres la mejor chica de este mundo: hermosa, inteligente, graciosa, un poco loca y con un hermoso corazón. Siempre recuerda que serás importante... bueno para mí lo eres.</p>
        <p>Eres una persona muy especial para mí.</p>
        <div class="corazon">❤</div>
    </div>
</body>
</html>
